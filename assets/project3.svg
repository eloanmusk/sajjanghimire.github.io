<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Dashboard/Task board -->
  <g transform="translate(200, 150)">
    <!-- Main board -->
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#000" stroke-width="2" rx="5"/>
    
    <!-- Columns -->
    <line x1="-33" y1="-50" x2="-33" y2="50" stroke="#000" stroke-width="1.5"/>
    <line x1="-16" y1="-50" x2="-16" y2="50" stroke="#000" stroke-width="1.5"/>
    <line x1="17" y1="-50" x2="17" y2="50" stroke="#000" stroke-width="1.5"/>
    
    <!-- Column headers -->
    <text x="-42" y="-35" font-size="10" font-weight="600" fill="#000">TODO</text>
    <text x="-25" y="-35" font-size="10" font-weight="600" fill="#000">IN PROGRESS</text>
    <text x="8" y="-35" font-size="10" font-weight="600" fill="#000">DONE</text>
    
    <!-- Task cards -->
    <!-- Column 1 -->
    <rect x="-50" y="-25" width="33" height="20" fill="none" stroke="#000" stroke-width="1.5" rx="2"/>
    <rect x="-50" y="0" width="33" height="20" fill="none" stroke="#000" stroke-width="1.5" rx="2"/>
    
    <!-- Column 2 -->
    <rect x="-33" y="-25" width="33" height="20" fill="none" stroke="#000" stroke-width="1.5" rx="2"/>
    
    <!-- Column 3 -->
    <rect x="-16" y="-25" width="33" height="20" fill="none" stroke="#000" stroke-width="1.5" rx="2"/>
    <rect x="-16" y="0" width="33" height="20" fill="none" stroke="#000" stroke-width="1.5" rx="2"/>
    
    <!-- Checkmarks on completed items -->
    <polyline points="-8,-17 -3,-12 5,-20" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="-8,8 -3,13 5,5" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="270" font-size="16" font-weight="600" text-anchor="middle" fill="#333">Task Manager</text>
</svg>
